<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE SEGURIDAD PUBLICA TZOMPANTEPEC - Validación Táctica</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@400;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --tzomp-blue: #0f172a;
            --tzomp-gold: #c5a059;
            --tzomp-light: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        body {
            min-height: 100vh;
            background: #0a192f;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
        }

        .credencial-virtual-container {
            width: 100%;
            max-width: 420px;
            position: relative;
            transform: scale(0.98);
            transition: transform 0.3s ease;
        }

        .credencial-virtual-container:hover {
            transform: scale(1);
        }

        .credencial-tzomp-ui {
            width: 100%;
            min-height: 650px;
            background: white;
            border-radius: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Badge de Validación */
        .status-stamp {
            position: absolute;
            top: 25px;
            right: -35px;
            background: var(--success);
            color: white;
            padding: 10px 45px;
            transform: rotate(25deg);
            font-weight: 900;
            z-index: 100;
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-family: 'Montserrat', sans-serif;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .status-stamp.inactive {
            background: var(--danger);
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
        }

        .tzomp-header-premium {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .tzomp-header-premium img {
            height: 50px;
            object-fit: contain;
        }

        .tzomp-banner-solid {
            background: var(--tzomp-blue);
            color: white;
            text-align: center;
            padding: 15px 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            line-height: 1.1;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tzomp-body-premium {
            flex: 1;
            padding: 30px 25px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .photo-container-premium {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .photo-frame-premium {
            width: 140px;
            height: 180px;
            border-radius: 15px;
            background: #f1f5f9;
            overflow: hidden;
            border: 1px solid #e2e8f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            flex-shrink: 0;
        }

        .photo-frame-premium img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-core-premium {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .field-item-premium {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 5px;
        }

        .field-label-premium {
            font-size: 0.7rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .field-value-premium {
            font-size: 1.1rem;
            color: var(--tzomp-blue);
            font-weight: 800;
            line-height: 1.2;
        }

        .field-value-premium.name {
            font-size: 1.4rem;
            line-height: 1;
            margin-top: 2px;
        }

        .signature-grid-premium {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 5px;
        }

        .sig-container-premium {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sig-box-premium {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            height: 80px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .sig-box-premium img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            mix-blend-mode: multiply;
        }

        .footer-tactical-premium {
            height: 110px;
            background: var(--tzomp-blue);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            color: white;
            border-top: 4px solid var(--tzomp-gold);
        }

        .footer-logo-premium {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-logo-premium img {
            height: 50px;
            filter: brightness(0) invert(1);
        }

        .footer-logo-premium span {
            color: var(--tzomp-gold);
            font-weight: 900;
            font-size: 0.7rem;
            margin-top: 2px;
        }

        .footer-text-premium {
            text-align: center;
            font-weight: 800;
            font-size: 0.8rem;
            line-height: 1.2;
            letter-spacing: 0.5px;
        }

        .footer-qr-mock {
            width: 65px;
            height: 65px;
            background: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
        }

        .footer-qr-mock i {
            font-size: 2.8rem;
            color: var(--tzomp-blue);
        }

        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            color: var(--tzomp-gold);
        }

        .loading-screen i {
            font-size: 4rem;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        @media (max-width: 400px) {
            .credencial-virtual-container {
                transform: scale(0.9);
            }
        }
    </style>
</head>

<body>
    <div id="mainContainer" class="credencial-virtual-container">
        <div class="loading-screen">
            <i class="fas fa-shield-halved fa-beat"></i>
            <h2 style="font-family: Montserrat; font-weight: 900;">AUTENTICANDO...</h2>
            <p style="color: white; opacity: 0.7;">Conectando a Red C2 Tzompantepec</p>
        </div>
    </div>

    <script src="js/gas-api.js"></script>
    <script>
        function formatPhotoUrl(foto, cuip) {
            if (!foto || foto === 'foto' || foto === '---' || foto.trim() === '') {
                return 'assets/FOTOGRAFIAS PERSONAL/' + (cuip || 'default').trim() + '.png';
            }
            if (foto.startsWith('data:')) return foto;
            if (foto.includes('drive.google.com')) {
                const idMatch = foto.match(/id=([^&]+)/) || foto.match(/\/d\/([^/]+)/);
                if (idMatch) return `https://drive.google.com/thumbnail?id=${idMatch[1]}&sz=w600`;
            }
            return foto;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const idToSearch = params.get('id') || params.get('cuip');
            const container = document.getElementById('mainContainer');

            if (!idToSearch) {
                container.innerHTML = '<div style="background:var(--danger); color:white; padding:30px; border-radius:15px; text-align:center; font-weight:800; border:4px solid white;">ERROR: IDENTIFICADOR NO PROPORCIONADO</div>';
                return;
            }

            try {
                const personal = await apiGetPersonal();
                const cop = personal.find(p =>
                    (p.cuip && String(p.cuip).trim().toUpperCase() === String(idToSearch).trim().toUpperCase()) ||
                    (p.nombre && p.nombre.trim().toUpperCase() === idToSearch.trim().toUpperCase())
                );

                if (cop) {
                    const isActive = (cop.estado || '').toLowerCase().includes('activo');

                    container.innerHTML = `
                        <div class="credencial-tzomp-ui">
                            <div class="status-stamp ${isActive ? '' : 'inactive'}">${isActive ? 'VALIDADO' : 'INACTIVO'}</div>
                            
                            <div class="tzomp-header-premium">
                                <img src="assets/escudo_tzomp.png">
                                <img src="assets/SPT.png">
                            </div>
                            
                            <div class="tzomp-banner-solid">SEGURIDAD PÚBLICA<br>TZOMPANTEPEC</div>
                            
                            <div class="tzomp-body-premium">
                                <div class="photo-container-premium">
                                    <div class="photo-frame-premium">
                                        <img src="${formatPhotoUrl(cop.foto, cop.cuip)}" 
                                             onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(cop.nombre)}&background=0f172a&color=fff&size=300&bold=true'">
                                    </div>
                                    <div class="info-core-premium">
                                        <div class="field-item-premium">
                                            <span class="field-label-premium">Nombre del Elemento</span>
                                            <span class="field-value-premium name">${cop.nombre}</span>
                                        </div>
                                        <div class="field-item-premium">
                                            <span class="field-label-premium">Cargo Operativo</span>
                                            <span class="field-value-premium">${cop.cargo}</span>
                                        </div>
                                    </div>
                                </div>

                                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                                    <div class="field-item-premium">
                                        <span class="field-label-premium">CUIP (Clave Única)</span>
                                        <span class="field-value-premium" style="font-family:monospace; font-size:1rem;">${cop.cuip}</span>
                                    </div>
                                    <div class="field-item-premium">
                                        <span class="field-label-premium">CURP</span>
                                        <span class="field-value-premium" style="font-size:0.95rem;">${cop.curp || '---'}</span>
                                    </div>
                                </div>

                                <div class="field-item-premium">
                                    <span class="field-label-premium">Vigencia SIBIM</span>
                                    <span class="field-value-premium" style="color:var(--success);">OFICIAL TZOMPANTEPEC</span>
                                </div>

                                <div class="signature-grid-premium">
                                    <div class="sig-container-premium">
                                        <span class="field-label-premium">Firma Titular</span>
                                        <div class="sig-box-premium">
                                            ${cop.firma ? `<img src="${cop.firma}">` : '<i class="fas fa-pen-nib" style="opacity:0.2; font-size:2rem;"></i>'}
                                        </div>
                                    </div>
                                    <div class="sig-container-premium">
                                        <span class="field-label-premium">Autorización</span>
                                        <div class="sig-box-premium" style="flex-direction:column; background:white;">
                                            <span style="font-family: Montserrat; font-weight: 800; font-size: 0.55rem; color: #000; text-align: center; line-height: 1.1; position: relative; z-index: 2;">
                                                C.P. MARCELINO RAMOS MONTIEL<br>PRESIDENTE MUNICIPAL
                                            </span>
                                            <img src="assets/firma_presidencia.png" style="position:absolute; height: 50px; opacity: 0.8; z-index: 1;" onerror="this.style.display='none'">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="footer-tactical-premium">
                                <div class="footer-logo-premium">
                                    <img src="assets/c2_logo.png" onerror="this.src='assets/escudo_tzomp.png'">
                                    <span>${cop.cuip || '120488'}</span>
                                </div>
                                <div class="footer-text-premium">PROPIEDAD DE GOBIERNO<br>DE TZOMPANTEPEC</div>
                                <div class="footer-qr-mock" id="footerQrContainer" style="padding:3px;">
                                    <img id="footerQrImg" src="https://api.qrserver.com/v1/create-qr-code/?size=65x65&data=${encodeURIComponent(window.location.href)}&ecc=H" 
                                         style="width:100%; height:100%; border-radius:6px;" 
                                         onerror="this.parentNode.innerHTML='<i class=\'fas fa-qrcode\' style=\'font-size:2.8rem; color:#0a192f;\'></i>'">
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    container.innerHTML = '<div style="background:var(--danger); color:white; padding:40px; border-radius:20px; text-align:center;"><h3>ERROR 404: NO REGISTRADO</h3><p>El identificador proporcionado no corresponde a ningún elemento del sistema.</p></div>';
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="background:var(--danger); color:white; padding:40px; border-radius:20px; text-align:center;"><h3>ERROR DE CONEXIÓN</h3><p>No se pudo establecer contacto con el servidor de seguridad.</p></div>';
            }
        });
    </script>
</body>

</html>


</html>
