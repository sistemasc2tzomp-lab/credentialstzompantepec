<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credencial Virtual - SPT Tzompantepec</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Inter:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            min-height: 100vh;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        /* Contenedor de la Credencial Virtual */
        .credencial-virtual-container {
            width: 100%;
            max-width: 450px;
            position: relative;
        }

        .credencial-tzomp-ui {
            width: 100%;
            height: 640px;
            background: white;
            border-radius: 25px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .tzomp-header {
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            box-sizing: border-box;
        }

        .tzomp-header img {
            height: 60px;
            object-fit: contain;
        }

        .tzomp-banner {
            background: #1a3a6e;
            color: white;
            text-align: center;
            padding: 12px 0;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            line-height: 1.2;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .tzomp-body {
            flex: 1;
            padding: 25px;
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 20px;
            align-items: start;
        }

        .photo-frame {
            width: 170px;
            height: 220px;
            border-radius: 15px;
            background: #f8fafc;
            border: 2px solid #e2e8f0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .info-item {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 0.8rem;
            color: #64748b;
            font-weight: 500;
        }

        .info-value {
            font-size: 1rem;
            color: #0f172a;
            font-weight: 700;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 2px;
        }

        .info-value.name {
            font-size: 1.2rem;
            color: #000;
            font-weight: 800;
            border-bottom: none;
        }

        .signature-section {
            padding: 0 25px 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .sig-box-ui {
            border: 1px solid #e2e8f0;
            height: 70px;
            border-radius: 8px;
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #fdfdfd;
        }

        .sig-label-ui {
            font-size: 0.65rem;
            font-weight: 800;
            color: #a4abb5;
            text-transform: uppercase;
            width: 100%;
            text-align: left;
            margin-bottom: 2px;
        }

        .tzomp-footer {
            height: 140px;
            position: relative;
            overflow: hidden;
            margin-top: auto;
        }

        .wave-bg-ui {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 75%;
            background: linear-gradient(180deg, #1a3a6e 0%, #0a192f 100%);
            z-index: 1;
        }

        .wave-svg-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2;
        }

        .footer-content-ui {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 3;
            box-sizing: border-box;
        }

        .footer-logo-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .footer-text-ui {
            color: white;
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 5px;
            line-height: 1.2;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: -10px;
            background: #10b981;
            color: white;
            padding: 8px 25px;
            transform: rotate(15deg);
            font-weight: 900;
            z-index: 10;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
            border-radius: 5px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .status-badge.inactive {
            background: #ef4444;
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
        }

        .loading-state {
            text-align: center;
            color: #1a3a6e;
        }

        .loading-state i {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        @media (max-width: 480px) {
            .credencial-tzomp-ui {
                height: auto;
                min-height: 640px;
            }

            .tzomp-body {
                grid-template-columns: 1fr;
                justify-items: center;
            }

            .photo-frame {
                width: 220px;
                height: 280px;
            }

            .info-list {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div id="mainContainer" class="credencial-virtual-container">
        <div class="loading-state">
            <i class="fas fa-shield-halved fa-beat"></i>
            <h3>Validando Identidad Oficial...</h3>
            <p>Conectando con Sistemas C2 Tzompantepec</p>
        </div>
    </div>

    <script src="js/gas-api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const idToSearch = params.get('id') || params.get('cuip');
            const container = document.getElementById('mainContainer');

            if (!idToSearch) {
                container.innerHTML = '<div class="tzomp-banner" style="background:#ef4444; border-radius:15px; padding:40px;">ERROR: IDENTIFICADOR NO PROPORCIONADO</div>';
                return;
            }

            try {
                let personal = await apiGetPersonal();

                // Fallback a datos demo si la API falla (para pruebas)
                if (!personal || personal.length === 0) {
                    console.warn('API de personal no disponible, usando datos de respaldo.');
                    personal = [
                        { nombre: 'Juan Romero', cargo: 'Supervisor', cuip: '181119880', curp: 'RONJ8811H8TLMVN08', estado: 'Activo', foto: '' },
                        { nombre: 'María González', cargo: 'Guardia', cuip: '181119881', curp: 'GOMM850201MDFRN09', estado: 'Vacaciones', foto: '' },
                        { nombre: 'Pedro Sánchez', cargo: 'Jefe de Turno', cuip: '181119882', curp: 'SAPE900305HDFRN10', estado: 'Activo', foto: '' }
                    ];
                }

                const cop = personal.find(p => 
                    (p.cuip && String(p.cuip).trim().toUpperCase() === String(idToSearch).trim().toUpperCase()) ||
                    (p.id && String(p.id).trim().toUpperCase() === String(idToSearch).trim().toUpperCase()) ||
                    (p.nombre && p.nombre.trim().toUpperCase() === idToSearch.trim().toUpperCase())
                );

                if (cop) {
                    const isActive = cop.estado.toLowerCase().includes('activo');
                    const badgeText = isActive ? 'VALIDADO' : 'INACTIVO';
                    const badgeClass = isActive ? '' : 'inactive';

                    container.innerHTML = `
                        <div class="status-badge ${badgeClass}">${badgeText}</div>
                        <div class="credencial-tzomp-ui">
                            <div class="tzomp-header">
                                <img src="assets/escudo_tzomp.png">
                                <img src="assets/c2_logo.png">
                                <img src="assets/SPT.png">
                            </div>
                            <div class="tzomp-banner">SEGURIDAD PÚBLICA<br>TZOMPANTEPEC</div>
                            <div class="tzomp-body">
                                <div class="photo-frame">
                                    <img src="${(cop.foto && cop.foto !== 'foto') ? cop.foto : 'assets/FOTOGRAFIAS PERSONAL/' + (cop.cuip ? cop.cuip.trim() : 'default') + '.png'}" 
                                         onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(cop.nombre)}&background=1a3a6e&color=fff&size=200&bold=true'"
                                         style="width:100%; height:100%; object-fit:cover;">
                                </div>
                                <div class="info-list">
                                    <div class="info-item">
                                        <span class="info-label">Nombre del Elemento:</span>
                                        <span class="info-value name">${cop.nombre} ${cop.apellidos || ''}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Cargo Operativo:</span>
                                        <span class="info-value">${cop.cargo}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">CUIP (Clave Única):</span>
                                        <span class="info-value" style="font-family:monospace;">${cop.cuip}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">CURP:</span>
                                        <span class="info-value">${cop.curp || '---'}</span>
                                    </div>
                                    <div class="info-item">
                                        <span class="info-label">Vigencia SIBIM:</span>
                                        <span class="info-value" style="color:#10b981;">OFICIAL Tzompantepec</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="signature-section">
                                <div>
                                    <span class="sig-label-ui">FIRMA TITULAR:</span>
                                    <div class="sig-box-ui">
                                        <img src="assets/firma_placeholder.png" style="height: 50px; opacity: 0.5;" onerror="this.style.display='none'">
                                    </div>
                                </div>
                                <div>
                                    <span class="sig-label-ui">AUTORIZACIÓN:</span>
                                    <div class="sig-box-ui" style="flex-direction: column; background: white;">
                                        <div style="font-family: 'Dancing Script', cursive; font-size: 1.1rem; color: #1a3a6e; margin-bottom: 2px;">Marcelino Ramos M.</div>
                                        <div style="font-size: 0.5rem; font-weight: 700; color: #000; text-align: center; line-height: 1.1;">C.P. MARCELINO RAMOS MONTIEL<br>PRESIDENTE MUNICIPAL</div>
                                        <img src="assets/firma_presidencia.png" style="position: absolute; height: 35px; opacity: 0.7; pointer-events: none;" onerror="this.style.display='none'">
                                    </div>
                                </div>
                            </div>
                            
                            <div class="tzomp-footer" style="margin-top:auto;">
                                <svg class="wave-svg-ui" viewBox="0 0 450 60" preserveAspectRatio="none">
                                    <path d="M0,40 C120,60 330,10 450,40 L450,60 L0,60 Z" fill="#1a3a6e" />
                                    <path d="M0,45 C150,65 300,15 450,45" fill="none" stroke="#c5a059" stroke-width="3" />
                                </svg>
                                <div class="wave-bg-ui"></div>
                                <div class="footer-content-ui">
                                    <div class="footer-logo-group">
                                        <img src="assets/c2_logo.png" style="height: 40px; filter: brightness(0) invert(1) sepia(1) saturate(5) hue-rotate(10deg);">
                                        <span style="color: #c5a059; font-size: 0.6rem; font-weight: 900; margin-top: 2px; font-family: monospace;">120488</span>
                                    </div>
                                    <div class="footer-text-ui">PROPIEDAD DE GOBIERNO<br>DE TZOMPANTEPEC</div>
                                    <div style="width: 60px; height: 60px; background: white; border-radius: 5px; padding: 4px; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
                                         <i class="fas fa-qrcode" style="font-size: 2.5rem; color: #1a3a6e;"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div style="text-align: center; margin-top: 20px; color: #64748b; font-size: 0.8rem;">
                            <i class="fas fa-lock"></i> Información Protegida y Validada por Dirección de Seguridad Pública
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="tzomp-banner" style="background:#ef4444; border-radius:15px; padding:40px;">
                            <i class="fas fa-user-xmark" style="font-size: 3rem; margin-bottom: 15px;"></i>
                            <h3>PERSONAL NO ENCONTRADO</h3>
                            <p>El identificador ${idToSearch} no corresponde a un elemento activo o registrado.</p>
                        </div>
                    `;
                }
            } catch (err) {
                container.innerHTML = '<div class="tzomp-banner" style="background:#f59e0b; border-radius:15px; padding:40px;">ERROR DE CONEXIÓN CON EL SERVIDOR C2</div>';
            }
        });
    </script>
</body>

</html>
