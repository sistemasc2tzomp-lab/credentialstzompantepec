<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Credencialización</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="dashboard">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-id-card"></i>
                <span>Personal Credencializado</span>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="active" data-section="inicio">
                    <i class="fas fa-home"></i>
                    <span>Inicio</span>
                </a>
                <a href="#" data-section="personal">
                    <i class="fas fa-users"></i>
                    <span>Personal</span>
                </a>
                <a href="#" data-section="credenciales">
                    <i class="fas fa-id-card"></i>
                    <span>Credenciales</span>
                </a>
                <!-- Nuevas secciones agregadas -->
                <a href="#" data-section="movimientos">
                    <i class="fas fa-history"></i>
                    <span>Movimientos</span>
                </a>
                <a href="#" data-section="reportes">
                    <i class="fas fa-chart-bar"></i>
                    <span>Reportes</span>
                </a>
                <a href="#" data-section="repositorio">
                    <i class="fas fa-database"></i>
                    <span>Repositorio</span>
                </a>
                <a href="#" data-section="qr-repo">
                    <i class="fas fa-qrcode"></i>
                    <span>Repositorio QR</span>
                </a>
                <a href="#" data-section="inventario">
                    <i class="fas fa-box-open"></i>
                    <span>Inventario Equipo</span>
                </a>
                <a href="#" data-section="multas">
                    <i class="fas fa-receipt"></i>
                    <span>Multas Tránsito</span>
                </a>
                <a href="#" data-section="documentacion">
                    <i class="fas fa-folder-open"></i>
                    <span>Documentación</span>
                </a>
                <a href="#" data-section="configuracion">
                    <i class="fas fa-cogs"></i>
                    <span>Configuración</span>
                </a>
                <div class="admin-section" id="adminSection">
                    <a href="#" data-section="usuarios">
                        <i class="fas fa-user-cog"></i>
                        <span>Gestión Usuarios</span>
                    </a>
                </div>
                <a href="#" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Salir</span>
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <span id="userName">Usuario</span>
                    <span class="user-role" id="userRole">Administrador</span>
                </div>
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
            </header>

            <div class="content" id="contentArea">
                <!-- Contenido dinámico -->
            </div>
        </main>
    </div>

    <!-- Librería para códigos QR reales -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>

    <!-- Chart.js para estadísticas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Scripts en el orden correcto -->
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/google-sheets.js"></script>
    <script src="js/credencial-generator.js"></script>

    <!-- Nuevos scripts para auditoría y reportes -->
    <script src="js/audit-logger.js"></script>
    <script src="js/reports-generator.js"></script>
</body>

</html>
